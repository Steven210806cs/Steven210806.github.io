<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti mi amor <3 </title>

<style>
body {
    margin: 0;
    font-family: Arial;
}
h1 {
    font-size: 60px;
}
.slide {
    display: none;
    height: 100vh;
    width: 100%;
    color: white;
    text-align: center;
    padding-top: 20%;
    position: absolute;
}

.slide1 { background: #1e1e2f; }
.slide2 { background: #3a3a5a; }
.slide3 { background: #222; }

.active {
    display: block;
}

button {
    margin-top: 60px;
    padding: 10px 20px;
    font-size: 30px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="slide slide1 active">
    <h1 style="font-size: 60px;">Para ti ❤️</h1>
    <p>Hice esto porque hay cosas que no se pueden decir en un solo mensaje...</p>
    <img src="corazon.png">
    <button onclick="nextSlide()">Siguiente</button>
</div>

<div class="slide slide2">
    <h1>Nuestros momentos</h1>
    <p>Aquí puedes poner fotos</p>
    <button onclick="nextSlide()">Siguiente</button>
</div>

<div class="slide slide3">
    <h1>Lo que quiero decirte</h1>
    <p>Tu mensaje importante aquí...</p>
    <button onclick="goToStart()">Volver al inicio</button>
</div>

<script>
let current = 0;
let slides = document.querySelectorAll(".slide");

function nextSlide() {
    slides[current].classList.remove("active");
    current++;
    if (current < slides.length) {
        slides[current].classList.add("active");
    }
}

function goToStart() {
    slides[current].classList.remove("active");
    current = 0;
    slides[current].classList.add("active");
}
</script>

</body>
</html>
